<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1080" viewBox="0 0 1400 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f1e8" />
      <stop offset="100%" stop-color="#e8f1f8" />
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#17324d" />
      <stop offset="100%" stop-color="#3b658c" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f7fbfe" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#17324d" flood-opacity="0.14" />
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#355f86" />
    </marker>
    <style>
      .title {
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        font-size: 32px;
        font-weight: 700;
        fill: #ffffff;
      }
      .subtitle {
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #d9e7f3;
      }
      .section-title {
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        font-size: 18px;
        font-weight: 700;
        fill: #17324d;
      }
      .step-tag {
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 1px;
        fill: #5c7b96;
      }
      .box-title {
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        font-size: 18px;
        font-weight: 700;
        fill: #17324d;
      }
      .box-text {
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        font-size: 14px;
        fill: #2d465d;
      }
      .mono {
        font-family: "Consolas", "Courier New", monospace;
        font-size: 13px;
        fill: #3a556f;
      }
      .card {
        fill: url(#card);
        stroke: #b7cddd;
        stroke-width: 2;
        rx: 20;
        ry: 20;
        filter: url(#shadow);
      }
      .note {
        fill: #f1f8fc;
        stroke: #8eb3ce;
        stroke-width: 2;
        rx: 18;
        ry: 18;
      }
      .mode {
        fill: #fffdf5;
        stroke: #d8c782;
        stroke-width: 2;
        rx: 18;
        ry: 18;
      }
      .divider {
        fill: none;
        stroke: #c6d8e5;
        stroke-width: 2;
        stroke-dasharray: 8 10;
      }
      .arrow {
        fill: none;
        stroke: #355f86;
        stroke-width: 4;
        marker-end: url(#arrow);
      }
    </style>
  </defs>

  <rect width="1400" height="1080" fill="url(#bg)" />

  <rect x="40" y="28" width="1320" height="102" rx="26" ry="26" fill="url(#header)" />
  <text x="74" y="78" class="title">Metro Router 查询流程图</text>
  <text x="74" y="108" class="subtitle">前端按钮 -> Flask API -> C 核心 Dijkstra -> JSON 结果 -> 页面渲染</text>

  <rect x="60" y="154" width="360" height="82" class="note" />
  <text x="88" y="188" class="box-title">相关文件</text>
  <text x="88" y="214" class="mono">index.html / script.js / app.py / main.c / dijkstra.c</text>

  <rect x="700" y="154" width="640" height="82" class="note" />
  <text x="728" y="188" class="box-title">数据流说明</text>
  <text x="728" y="214" class="box-text">graph.txt 是 C 核心直接输入；stations.json 和 routes.json 主要用于前端搜索、地图绘制和结果展示。</text>

  <line x1="700" y1="260" x2="700" y2="930" class="divider" />
  <text x="230" y="272" class="section-title">前端 / Python 服务层</text>
  <text x="930" y="272" class="section-title">C 核心算法层</text>

  <rect x="90" y="300" width="520" height="112" class="card" />
  <text x="120" y="334" class="step-tag">STEP 1</text>
  <text x="120" y="364" class="box-title">前端按钮触发查询</text>
  <text x="120" y="390" class="box-text">页面在 metro_router/templates/index.html，按钮触发 queryPath(mode)</text>

  <rect x="90" y="446" width="520" height="112" class="card" />
  <text x="120" y="480" class="step-tag">STEP 2</text>
  <text x="120" y="510" class="box-title">向 /api/query 发起 POST 请求</text>
  <text x="120" y="536" class="box-text">请求体包含 start、end、mode、include_alternatives、schedule_config</text>

  <rect x="90" y="592" width="520" height="112" class="card" />
  <text x="120" y="626" class="step-tag">STEP 3</text>
  <text x="120" y="656" class="box-title">Flask 入口 app.py 解析请求</text>
  <text x="120" y="682" class="box-text">/api/query 读取参数，默认 mode 为 "2"，再进入 run_query 或备选方案逻辑</text>

  <rect x="90" y="738" width="520" height="112" class="card" />
  <text x="120" y="772" class="step-tag">STEP 4</text>
  <text x="120" y="802" class="box-title">run_query(...) 准备图数据并校验参数</text>
  <text x="120" y="828" class="box-text">检查站点和 mode，必要时按时段配置生成临时 graph 文件</text>

  <rect x="790" y="300" width="520" height="112" class="card" />
  <text x="820" y="334" class="step-tag">STEP 5</text>
  <text x="820" y="364" class="box-title">Python 通过 subprocess 调用 C 程序</text>
  <text x="820" y="390" class="box-text">执行 metro_router.exe &lt;graph_file&gt; &lt;mode&gt;，stdin 传起终点</text>

  <rect x="790" y="446" width="520" height="112" class="card" />
  <text x="820" y="480" class="step-tag">STEP 6</text>
  <text x="820" y="510" class="box-title">main.c 读取参数并载入图</text>
  <text x="820" y="536" class="box-text">读取 graph_file 和 mode，然后调用 graph_load_from_file 与 dijkstra_find_path</text>

  <rect x="790" y="592" width="520" height="112" class="card" />
  <text x="820" y="626" class="step-tag">STEP 7</text>
  <text x="820" y="656" class="box-title">dijkstra.c 根据 mode 计算最优路径</text>
  <text x="820" y="682" class="box-text">使用“站名 + 线路”状态节点模型，区分行车边和换乘边</text>

  <rect x="790" y="738" width="520" height="112" class="card" />
  <text x="820" y="772" class="step-tag">STEP 8</text>
  <text x="820" y="802" class="box-title">C 程序输出原始 JSON 结果</text>
  <text x="820" y="828" class="box-text">返回 path、total_time、transfers、transfer_stations、station_count</text>

  <rect x="90" y="884" width="1220" height="120" class="card" />
  <text x="120" y="918" class="step-tag">STEP 9</text>
  <text x="120" y="948" class="box-title">Python 二次加工结果后返回前端并渲染页面</text>
  <text x="120" y="974" class="box-text">enrich_result(...) 补充 mode_label、itinerary、segments、lines_used、current_period，然后前端 showResult / highlightPath</text>

  <path d="M350 412 L350 446" class="arrow" />
  <path d="M350 558 L350 592" class="arrow" />
  <path d="M350 704 L350 738" class="arrow" />
  <path d="M610 794 L700 794 L700 356 L790 356" class="arrow" />
  <path d="M1050 412 L1050 446" class="arrow" />
  <path d="M1050 558 L1050 592" class="arrow" />
  <path d="M1050 704 L1050 738" class="arrow" />
  <path d="M1050 850 L1050 884" class="arrow" />

  <rect x="760" y="884" width="550" height="120" class="mode" />
  <text x="790" y="918" class="box-title">Mode 语义</text>
  <text x="790" y="944" class="box-text">mode 0 = 时间最短</text>
  <text x="790" y="968" class="box-text">mode 1 = 换乘最少，时间仅用于打破平局</text>
  <text x="790" y="992" class="box-text">mode 2 = 综合最优，时间优先，换乘次优</text>

  <rect x="90" y="154" width="260" height="82" class="mode" />
  <text x="118" y="188" class="box-title">按钮与 mode</text>
  <text x="118" y="214" class="box-text">综合最优 = 2，时间最短 = 0，换乘最少 = 1</text>
</svg>
